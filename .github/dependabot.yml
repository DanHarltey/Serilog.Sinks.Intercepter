version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directories:
      - "/src/Serilog.Sinks.Intercepter/*"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "Serilog"
    groups:
      dotnet:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/" 
    exclude-paths:
      - "/src/Serilog.Sinks.Intercepter/*"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 10
    groups:
      dotnet:
        patterns:
          - "*"